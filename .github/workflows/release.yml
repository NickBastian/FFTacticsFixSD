name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # Build the entire solution so $(SolutionDir) resolves correctly for both
      # libMinHook (outputs to <root>\lib\Release\libMinHook.x64.lib) and
      # FFTacticsFix (outputs to <root>\FFTacticsFix\x64\Release\FFTacticsFix.asi).
      - name: Build solution (Release|x64)
        run: |
          msbuild FFTacticsFix.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m

      - name: Verify output files exist
        shell: pwsh
        run: |
          $lib = "lib\Release\libMinHook.x64.lib"
          $asi = "FFTacticsFix\x64\Release\FFTacticsFix.asi"
          foreach ($f in @($lib, $asi)) {
            if (!(Test-Path $f)) {
              Write-Error "Expected output not found: $f"
              exit 1
            }
            Write-Output "OK: $f"
          }

      - name: Package release artifact
        shell: pwsh
        run: |
          $outDir = "release_package"
          New-Item -ItemType Directory -Path $outDir | Out-Null
          Copy-Item "FFTacticsFix\x64\Release\FFTacticsFix.asi" "$outDir\FFTacticsFix.asi"
          Compress-Archive -Path "$outDir\*" -DestinationPath "FFTacticsFix.zip"

      - name: Compute SHA-256
        id: sha
        shell: pwsh
        run: |
          $hash = (Get-FileHash FFTacticsFix.zip -Algorithm SHA256).Hash.ToLower()
          $line = "sha256:$hash"
          $line | Out-File -FilePath sha256.txt -Encoding ascii -NoNewline
          "hash=$line" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding ascii -Append
          Write-Output "SHA256: $line"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: true
          body: |
            ## Changes
            See commit history for details.

            ## SHA-256
            `${{ steps.sha.outputs.hash }}`
          files: |
            FFTacticsFix.zip
            sha256.txt
